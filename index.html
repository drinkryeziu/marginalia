<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Marginalia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Fraunces:opsz,wght@9..144,340;9..144,500;9..144,600&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap"
      rel="stylesheet"
    />
    <style>
      html, body, #root { height: 100%; }
      body { margin: 0; background: #EDEBE4; }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      input { font-family: inherit; }
      ::placeholder { color: #9A9AAB; font-style: italic; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .spin { animation: spin 0.9s linear infinite; }
      @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
      .rise { animation: rise 0.5s cubic-bezier(0.2,0.7,0.2,1) both; }
      @keyframes welcome-rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
      .welcome { animation: welcome-rise 0.6s cubic-bezier(0.2,0.7,0.2,1) both; }
      @keyframes drawer-slide { from { transform: translateX(-100%); } to { transform: none; } }
      .drawer { animation: drawer-slide 0.28s cubic-bezier(0.2,0.7,0.2,1) both; }
      @media (prefers-reduced-motion: reduce) { .spin, .rise, .welcome, .drawer { animation: none !important; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
