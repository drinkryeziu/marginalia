<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <!-- Content-Security-Policy: only our own scripts run; network calls limited to
         Supabase; no plugins/inline scripts. Backstops any XSS. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://ejzzeuhhkmuooswabwzm.supabase.co; object-src 'none'; base-uri 'self'; form-action 'self'" />
    <title>My Little Secret Diary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,340;9..144,500;9..144,600&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap"
      rel="stylesheet"
    />
    <style>
      html, body, #root { height: 100%; }
      body { margin: 0; background: #EDEBE4; }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      input { font-family: inherit; }
      ::placeholder { color: #9A9AAB; font-style: italic; }
      /* Rich-text diary entry: placeholder when empty + bold/italic rendering. */
      .entry-editor:empty:before { content: attr(data-placeholder); color: #9A9AAB; font-style: italic; pointer-events: none; }
      .entry-editor b, .entry-editor strong { font-weight: 700; }
      .entry-editor i, .entry-editor em { font-style: italic; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .spin { animation: spin 0.9s linear infinite; }
      @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
      .rise { animation: rise 0.5s cubic-bezier(0.2,0.7,0.2,1) both; }
      @keyframes welcome-rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
      .welcome { animation: welcome-rise 0.6s cubic-bezier(0.2,0.7,0.2,1) both; }
      @keyframes drawer-slide { from { transform: translateX(-100%); } to { transform: none; } }
      .drawer { animation: drawer-slide 0.28s cubic-bezier(0.2,0.7,0.2,1) both; }
      @keyframes mic-pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(158,75,69,0.5); } 50% { box-shadow: 0 0 0 7px rgba(158,75,69,0); } }
      .mic-pulse { animation: mic-pulse 1.3s ease-in-out infinite; }
      @media (prefers-reduced-motion: reduce) { .spin, .rise, .welcome, .drawer, .mic-pulse { animation: none !important; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
